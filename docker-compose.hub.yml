services:
  yishe-models:
    image: ${DOCKER_USERNAME:-1sdesign}/yishe-models:${IMAGE_TAG:-latest}
    container_name: yishe-models
    ports:
      - "8900:8900"
    volumes:
      - ./models:/app/models
    environment:
      - PORT=8900
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8900/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    networks:
      - yishe-network

networks:
  yishe-network:
    driver: bridge
