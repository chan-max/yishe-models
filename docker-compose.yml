services:
  yishe-models:
    build: .
    container_name: yishe-models
    ports:
      - "8900:8900"
    volumes:
      - ./models:/app/models
    environment:
      - PORT=8900
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8900/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - yishe-network

networks:
  yishe-network:
    driver: bridge
